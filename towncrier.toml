# Towncrier changelog configuration.
# Lives at the repo root (not backend/pyproject.toml) so that
# `uv run towncrier` finds it when invoked from the repo root,
# where CHANGELOG.md and changelog.d/ live.
[tool.towncrier]
package = "version"
package_dir = "."
filename = "CHANGELOG.md"
directory = "changelog.d"
title_format = "## {version} ({project_date})"
template = "changelog.d/_template.md.jinja2"
# Markdown output: no rst-style title underlines
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "feature"
name = "Features"
showcontent = true

[[tool.towncrier.type]]
directory = "fix"
name = "Bug Fixes"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecation"
name = "Deprecations"
showcontent = true

[[tool.towncrier.type]]
directory = "improvement"
name = "Improvements"
showcontent = true

[[tool.towncrier.type]]
directory = "doc"
name = "Documentation"
showcontent = true

[[tool.towncrier.type]]
directory = "misc"
name = "Internal Changes"
showcontent = false
